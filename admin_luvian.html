<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUVIAN — Panel Administrador</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --azul: #0d1b3e;
  --azul-medio: #1a2f5a;
  --azul-claro: #243d72;
  --oro: #c9a84c;
  --oro-claro: #e6c97a;
  --crema: #FEFDF8;
  --blanco: #ffffff;
  --gris: #f4f3ef;
  --gris-2: #e8e7e2;
  --texto: #1a1a2e;
  --verde: #2ecc71;
  --rojo: #e74c3c;
  --naranja: #f39c12;
  --sidebar-w: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Jost',sans-serif; background:#0a1328; color:var(--blanco); display:flex; min-height:100vh; overflow-x:hidden; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--azul); }
::-webkit-scrollbar-thumb { background:var(--oro); border-radius:3px; }

/* ── LOGIN ── */
#loginScreen {
  position:fixed; inset:0; z-index:9999;
  background:linear-gradient(135deg, #060f24 0%, #0d1b3e 50%, #1a2f5a 100%);
  display:flex; align-items:center; justify-content:center;
}
.login-box {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:6px; padding:48px 44px; width:100%; max-width:420px;
  backdrop-filter:blur(20px);
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo-l {
  width:64px; height:64px; background:linear-gradient(135deg,var(--oro),var(--oro-claro));
  border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700; color:var(--azul);
  margin-bottom:14px;
}
.login-brand { font-family:'Cormorant Garamond',serif; font-size:1.8rem; letter-spacing:4px; font-weight:600; }
.login-sub { font-size:10px; letter-spacing:2.5px; color:var(--oro); text-transform:uppercase; margin-top:4px; }
.login-title { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:400; color:rgba(255,255,255,0.7); margin-bottom:28px; text-align:center; }
.l-field { margin-bottom:18px; }
.l-field label { display:block; font-size:10px; letter-spacing:2px; color:var(--oro); text-transform:uppercase; margin-bottom:6px; font-weight:500; }
.l-field input {
  width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.2);
  border-radius:2px; padding:13px 16px; color:var(--blanco);
  font-family:'Jost',sans-serif; font-size:14px; outline:none; transition:border 0.3s;
}
.l-field input:focus { border-color:var(--oro); }
.l-field input::placeholder { color:rgba(255,255,255,0.3); }
.l-tabs { display:flex; gap:4px; margin-bottom:24px; background:rgba(255,255,255,0.04); border-radius:4px; padding:4px; }
.l-tab {
  flex:1; padding:9px; border-radius:2px; border:none; cursor:pointer;
  font-family:'Jost',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase;
  font-weight:500; transition:all 0.3s; background:transparent; color:rgba(255,255,255,0.5);
}
.l-tab.active { background:var(--oro); color:var(--azul); }
.btn-login {
  width:100%; background:linear-gradient(135deg,var(--oro),var(--oro-claro));
  border:none; border-radius:2px; padding:14px;
  color:var(--azul); font-family:'Jost',sans-serif; font-size:13px;
  font-weight:600; letter-spacing:2px; cursor:pointer; text-transform:uppercase;
  transition:all 0.3s; margin-top:4px;
}
.btn-login:hover { transform:translateY(-2px); box-shadow:0 4px 20px rgba(201,168,76,0.3); }
.login-hint { text-align:center; margin-top:16px; font-size:11px; color:rgba(255,255,255,0.25); }
.login-error { color:#e74c3c; font-size:12px; text-align:center; margin-top:8px; display:none; }

/* ── SIDEBAR ── */
#app { display:none; width:100%; }
.sidebar {
  width:var(--sidebar-w); min-height:100vh; position:fixed; left:0; top:0;
  background:linear-gradient(180deg, #08111f 0%, #0d1b3e 100%);
  border-right:1px solid rgba(201,168,76,0.12);
  display:flex; flex-direction:column; z-index:100;
  transition:transform 0.3s;
}
.sb-logo {
  padding:28px 24px 24px; border-bottom:1px solid rgba(201,168,76,0.1);
  display:flex; align-items:center; gap:12px;
}
.sb-logo-icon {
  width:40px; height:40px; background:linear-gradient(135deg,var(--oro),var(--oro-claro));
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--azul);
  flex-shrink:0;
}
.sb-logo-text { font-family:'Cormorant Garamond',serif; font-size:1.2rem; letter-spacing:2px; font-weight:600; }
.sb-logo-sub { font-size:8px; letter-spacing:2px; color:var(--oro); text-transform:uppercase; }

.sb-role-badge {
  margin:16px 20px; padding:8px 14px;
  background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.2); border-radius:2px;
  font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--oro);
  text-align:center; font-weight:500;
}

.sb-section { padding:8px 16px 4px; font-size:9px; letter-spacing:2.5px; color:rgba(255,255,255,0.25); text-transform:uppercase; font-weight:500; margin-top:8px; }
.sb-nav { padding:0 12px; flex:1; overflow-y:auto; }
.sb-item {
  display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:3px;
  cursor:pointer; font-size:13px; color:rgba(255,255,255,0.6); font-weight:500;
  transition:all 0.2s; margin-bottom:2px; border:1px solid transparent;
  text-decoration:none;
}
.sb-item:hover { color:var(--blanco); background:rgba(255,255,255,0.05); }
.sb-item.active { color:var(--oro); background:rgba(201,168,76,0.08); border-color:rgba(201,168,76,0.15); }
.sb-item .icon { font-size:16px; width:20px; text-align:center; }
.sb-badge {
  margin-left:auto; background:var(--rojo); color:white; border-radius:50px;
  padding:1px 7px; font-size:10px; font-weight:600;
}
.sb-badge.oro { background:var(--oro); color:var(--azul); }

.sb-footer {
  padding:16px 20px; border-top:1px solid rgba(201,168,76,0.1);
  font-size:12px; color:rgba(255,255,255,0.4);
}
.sb-user { display:flex; align-items:center; gap:10px; }
.sb-avatar {
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg,var(--azul-claro),var(--azul-medio));
  border:1px solid var(--oro); display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:600; color:var(--oro);
}
.sb-user-name { font-size:13px; color:rgba(255,255,255,0.7); font-weight:500; }
.sb-user-role { font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:1px; }
.btn-logout { margin-left:auto; background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:16px; transition:color 0.3s; }
.btn-logout:hover { color:var(--rojo); }

/* ── MAIN ── */
.main { margin-left:var(--sidebar-w); flex:1; min-height:100vh; background:#0a1328; }
.topbar {
  background:rgba(13,27,62,0.9); backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(201,168,76,0.1);
  padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
}
.topbar-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:500; }
.topbar-actions { display:flex; gap:10px; }
.btn-primary {
  background:linear-gradient(135deg,var(--oro),var(--oro-claro)); border:none; border-radius:2px;
  padding:9px 20px; color:var(--azul); font-family:'Jost',sans-serif; font-size:12px;
  font-weight:600; letter-spacing:1px; cursor:pointer; text-transform:uppercase; transition:all 0.3s;
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(201,168,76,0.3); }
.btn-ghost {
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:2px;
  padding:9px 18px; color:rgba(255,255,255,0.7); font-family:'Jost',sans-serif; font-size:12px;
  font-weight:500; cursor:pointer; letter-spacing:1px; text-transform:uppercase; transition:all 0.3s;
}
.btn-ghost:hover { border-color:var(--oro); color:var(--oro); }

/* ── PAGES ── */
.page { display:none; padding:32px; animation:fadeIn 0.3s ease; }
.page.active { display:block; }

/* ── STAT CARDS ── */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:28px; }
.stat-card {
  background:linear-gradient(135deg, rgba(26,47,90,0.8), rgba(13,27,62,0.9));
  border:1px solid rgba(201,168,76,0.15); border-radius:4px; padding:22px 24px;
  transition:all 0.3s; cursor:default;
}
.stat-card:hover { border-color:rgba(201,168,76,0.35); transform:translateY(-2px); }
.stat-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.stat-card-icon { font-size:22px; }
.stat-card-trend { font-size:11px; color:var(--verde); font-weight:500; }
.stat-card-num { font-family:'Cormorant Garamond',serif; font-size:2.2rem; font-weight:700; color:var(--oro); line-height:1; margin-bottom:4px; }
.stat-card-label { font-size:11px; color:rgba(255,255,255,0.5); letter-spacing:1.5px; text-transform:uppercase; }

/* ── TABLES ── */
.card {
  background:rgba(26,47,90,0.5); border:1px solid rgba(201,168,76,0.12);
  border-radius:4px; overflow:hidden; margin-bottom:24px;
}
.card-header {
  padding:18px 24px; border-bottom:1px solid rgba(201,168,76,0.1);
  display:flex; justify-content:space-between; align-items:center;
}
.card-title { font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:500; }
.card-body { padding:0; }

table { width:100%; border-collapse:collapse; }
th {
  padding:12px 18px; text-align:left; font-size:10px; letter-spacing:2px;
  text-transform:uppercase; color:var(--oro); background:rgba(13,27,62,0.5);
  font-weight:500; border-bottom:1px solid rgba(201,168,76,0.1);
}
td {
  padding:14px 18px; font-size:13px; color:rgba(255,255,255,0.75);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(201,168,76,0.03); }

.tag {
  display:inline-block; padding:3px 10px; border-radius:50px;
  font-size:10px; letter-spacing:1px; font-weight:600; text-transform:uppercase;
}
.tag-lote { background:rgba(13,27,62,0.8); color:var(--oro); border:1px solid rgba(201,168,76,0.3); }
.tag-vivienda { background:rgba(201,168,76,0.15); color:var(--oro-claro); border:1px solid rgba(201,168,76,0.25); }
.tag-nave { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.15); }
.tag-nuevo { background:rgba(46,204,113,0.15); color:var(--verde); border:1px solid rgba(46,204,113,0.25); }
.tag-pendiente { background:rgba(243,156,18,0.15); color:var(--naranja); border:1px solid rgba(243,156,18,0.25); }
.tag-leido { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.35); border:1px solid rgba(255,255,255,0.1); }
.tag-confirmada { background:rgba(46,204,113,0.15); color:var(--verde); border:1px solid rgba(46,204,113,0.25); }

.action-btns { display:flex; gap:6px; }
.btn-sm {
  padding:5px 12px; border-radius:2px; border:none; cursor:pointer;
  font-family:'Jost',sans-serif; font-size:11px; font-weight:500; letter-spacing:0.5px;
  transition:all 0.2s;
}
.btn-edit { background:rgba(201,168,76,0.15); color:var(--oro); }
.btn-edit:hover { background:rgba(201,168,76,0.25); }
.btn-del { background:rgba(231,76,60,0.15); color:var(--rojo); }
.btn-del:hover { background:rgba(231,76,60,0.25); }
.btn-view { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); }
.btn-view:hover { background:rgba(255,255,255,0.14); color:white; }
.btn-send { background:rgba(46,204,113,0.15); color:var(--verde); }
.btn-send:hover { background:rgba(46,204,113,0.25); }

/* ── FORM ── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.form-grid.cols3 { grid-template-columns:1fr 1fr 1fr; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--oro); font-weight:500; }
.form-group input, .form-group select, .form-group textarea {
  background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.18);
  border-radius:2px; padding:11px 14px; color:var(--blanco);
  font-family:'Jost',sans-serif; font-size:13px; outline:none; transition:border 0.3s;
  resize:none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--oro); }
.form-group input::placeholder, .form-group textarea::placeholder { color:rgba(255,255,255,0.25); }
.form-group select option { background:var(--azul); }

.img-upload-area {
  border:2px dashed rgba(201,168,76,0.25); border-radius:4px; padding:32px;
  text-align:center; cursor:pointer; transition:all 0.3s; color:rgba(255,255,255,0.4);
}
.img-upload-area:hover { border-color:var(--oro); color:var(--oro); }
.img-preview { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
.img-thumb {
  width:90px; height:70px; object-fit:cover; border-radius:2px;
  border:1px solid rgba(201,168,76,0.2);
}

/* ── MESSAGES ── */
.msg-list { display:flex; flex-direction:column; }
.msg-item {
  padding:18px 24px; border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer; transition:background 0.2s; display:flex; gap:16px; align-items:flex-start;
}
.msg-item:hover { background:rgba(255,255,255,0.03); }
.msg-item.unread { border-left:3px solid var(--oro); }
.msg-avatar {
  width:42px; height:42px; border-radius:50%;
  background:linear-gradient(135deg,var(--azul-claro),var(--azul-medio));
  border:1px solid rgba(201,168,76,0.3); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; color:var(--oro);
}
.msg-content { flex:1; }
.msg-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.msg-name { font-size:14px; font-weight:600; color:var(--blanco); }
.msg-time { font-size:11px; color:rgba(255,255,255,0.3); }
.msg-preview { font-size:13px; color:rgba(255,255,255,0.55); line-height:1.5; margin-bottom:6px; }
.msg-tags { display:flex; gap:6px; flex-wrap:wrap; }

/* ── CITAS ── */
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:20px; }
.cal-header { text-align:center; font-size:10px; letter-spacing:1.5px; color:var(--oro); text-transform:uppercase; padding:8px 4px; font-weight:600; }
.cal-day {
  min-height:64px; background:rgba(255,255,255,0.03); border-radius:3px;
  padding:8px; border:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:all 0.2s;
}
.cal-day:hover { border-color:rgba(201,168,76,0.25); background:rgba(201,168,76,0.04); }
.cal-day.today { border-color:var(--oro); background:rgba(201,168,76,0.07); }
.cal-day.has-event { border-color:rgba(46,204,113,0.3); }
.cal-day-num { font-size:13px; font-weight:500; color:rgba(255,255,255,0.7); margin-bottom:4px; }
.cal-day.today .cal-day-num { color:var(--oro); font-weight:700; }
.cal-event {
  background:rgba(46,204,113,0.2); border-radius:2px; padding:2px 5px;
  font-size:9px; color:var(--verde); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.cal-event.oro { background:rgba(201,168,76,0.2); color:var(--oro); }

/* ── MODAL ── */
.overlay {
  position:fixed; inset:0; z-index:1000;
  background:rgba(8,17,31,0.85); backdrop-filter:blur(16px);
  display:none; align-items:center; justify-content:center; padding:24px;
}
.overlay.open { display:flex; }
.modal-box {
  background:var(--azul-medio); border:1px solid rgba(201,168,76,0.25);
  border-radius:6px; width:100%; max-width:680px; max-height:90vh; overflow-y:auto;
  animation:fadeIn 0.25s ease;
}
.modal-hd {
  padding:22px 26px; border-bottom:1px solid rgba(201,168,76,0.1);
  display:flex; justify-content:space-between; align-items:center;
}
.modal-hd h3 { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:500; }
.modal-close { background:none; border:none; color:rgba(255,255,255,0.4); font-size:22px; cursor:pointer; transition:color 0.3s; }
.modal-close:hover { color:var(--rojo); }
.modal-bd { padding:24px 26px 28px; }

/* ── PRESUPUESTO ── */
.presup-item {
  display:grid; grid-template-columns:1fr auto auto;
  gap:12px; align-items:center; padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.presup-total {
  background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.2);
  border-radius:2px; padding:14px 18px;
  display:flex; justify-content:space-between; align-items:center; margin-top:16px;
}
.presup-total-label { font-size:12px; letter-spacing:1.5px; color:var(--oro); text-transform:uppercase; }
.presup-total-val { font-family:'Cormorant Garamond',serif; font-size:1.8rem; color:var(--oro); font-weight:700; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:28px; right:28px; z-index:9000;
  background:var(--azul-medio); border:1px solid rgba(201,168,76,0.3); border-radius:4px;
  padding:14px 20px; font-size:13px; color:var(--blanco);
  box-shadow:0 8px 32px rgba(0,0,0,0.4); transform:translateY(80px); opacity:0;
  transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); pointer-events:none;
  max-width:320px; display:flex; align-items:center; gap:10px;
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:rgba(46,204,113,0.4); }
.toast.error { border-color:rgba(231,76,60,0.4); }

/* ── CHARTS placeholder ── */
.mini-chart { height:60px; display:flex; align-items:flex-end; gap:4px; padding:0 4px; }
.bar { flex:1; border-radius:2px 2px 0 0; background:rgba(201,168,76,0.35); transition:height 0.5s; min-height:4px; }
.bar.active { background:var(--oro); }

/* ── TOGGLE ── */
.toggle-wrap { display:flex; align-items:center; gap:10px; }
.toggle { position:relative; width:42px; height:22px; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider {
  position:absolute; inset:0; border-radius:50px; cursor:pointer;
  background:rgba(255,255,255,0.1); transition:0.3s;
}
.toggle-slider:before {
  content:''; position:absolute; width:16px; height:16px;
  bottom:3px; left:3px; border-radius:50%;
  background:rgba(255,255,255,0.5); transition:0.3s;
}
.toggle input:checked + .toggle-slider { background:rgba(201,168,76,0.4); }
.toggle input:checked + .toggle-slider:before { transform:translateX(20px); background:var(--oro); }

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; }
  .stats-grid { grid-template-columns:1fr 1fr; }
  .form-grid, .form-grid.cols3 { grid-template-columns:1fr; }
  .page { padding:20px 16px; }
}

/* ── USER PANEL adjustments ── */
.user-prop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
.user-prop-card {
  background:rgba(26,47,90,0.5); border:1px solid rgba(201,168,76,0.12);
  border-radius:4px; overflow:hidden; transition:all 0.3s; cursor:pointer;
}
.user-prop-card:hover { border-color:rgba(201,168,76,0.3); transform:translateY(-3px); }
.user-prop-img { width:100%; height:170px; object-fit:cover; display:block; }
.user-prop-body { padding:16px; }

// ── LOGIN ──────────────────────────────────────────────────────
function setLoginRole(role, btn) {
  currentRole = role;
  document.querySelectorAll('.l-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const creds = currentRole==='admin' ? getAdminCreds() : USER_CREDS;
  if(u===creds.user && p===creds.pass) {
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    sessionStorage.setItem('luvian_session_exp', String(Date.now() + 30*60*1000));
    initApp();
  } else {
    const err = document.getElementById('loginError');
    err.style.display='block';
    setTimeout(()=>err.style.display='none',2500);
  }
}
function logout() {
  sessionStorage.removeItem('luvian_session_exp');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}
setInterval(()=>{
  const exp = +sessionStorage.getItem('luvian_session_exp');
  if(exp && Date.now() > exp && document.getElementById('app').style.display==='flex') {
    toast('Sesión expirada por inactividad', 'error');
    logout();
  }
}, 60000);

function goPage(id) {
  currentPage = id;
  document.getElementById('pageTitle').textContent = pageTitles[id] || id;
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(i=>{ if(i.onclick && i.onclick.toString().includes(`'${id}'`)) i.classList.add('active'); });
  const pagesDiv = document.getElementById('pages');
  pagesDiv.innerHTML = '';
  const page = document.createElement('div');
  page.className = 'page active';
  page.id = 'page-'+id;
  pagesDiv.appendChild(page);
  const tb = document.getElementById('topbarActions');
  tb.innerHTML = '';

  const renders = {
    'dashboard': renderDashboard,
    'propiedades': renderPropiedades,

function filterPropTable() {
  const q = (document.getElementById('propSearch')?.value||'').toLowerCase();
  const t = document.getElementById('propTipoFilter')?.value||'';
  const filtered = propiedades.filter(p=>
    (!q || p.titulo.toLowerCase().includes(q) || p.zona.toLowerCase().includes(q)) &&
    (!t || p.tipo===t)
  );
  const tbody = document.getElementById('propTableBody');
  if(!tbody) return;
  tbody.innerHTML = filtered.map(p=>`
    <tr>
      <td style="color:rgba(255,255,255,0.35);font-size:11px">#${p.id}</td>
      <td><img src="${p.imgs[0]}" style="width:60px;height:44px;object-fit:cover;border-radius:2px;display:block;border:1px solid rgba(201,168,76,0.15)"></td>
      <td>
        <strong style="font-size:13px">${p.titulo}</strong>
        ${p.oferta?'<span class="tag" style="margin-left:6px;background:rgba(231,76,60,0.15);color:#e74c3c;border-color:rgba(231,76,60,0.2);font-size:9px">OFERTA</span>':''}
        <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px">📐 ${p.sup}</div>
      </td>
      <td><span class="tag tag-${p.tipo}">${p.tipo==='lote'?'Lote':p.tipo==='vivienda'?'Vivienda':'Nave'}</span></td>
      <td style="color:var(--oro);font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600">${p.precio}</td>
      <td style="font-size:12px;color:rgba(255,255,255,0.6)">📍 ${p.zona}</td>
      <td>
        <div class="toggle-wrap">
          <label class="toggle"><input type="checkbox" ${p.estado==='activo'?'checked':''} onchange="togglePropEstado(${p.id},this)"><span class="toggle-slider"></span></label>
          <span style="font-size:11px;color:rgba(255,255,255,0.4)">${p.estado}</span>
        </div>
      </td>
      <td>
        <div class="action-btns">
          <button class="btn-sm btn-edit" onclick="editProp(${p.id})">✏ Editar</button>
          <button class="btn-sm btn-del" onclick="delProp(${p.id})">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function togglePropEstado(id, el) {
  const p = propiedades.find(p=>p.id===id);
  if(p) { p.estado = el.checked?'activo':'pausado'; store('props',propiedades); toast('Estado actualizado','success'); }
}

function editProp(id) {
  const p = propiedades.find(p=>p.id===id);
  if(!p) return;
  openModal('Editar Publicación', buildPropForm(p));
}

function delProp(id) {
  if(!confirm('¿Eliminar esta publicación?')) return;
  propiedades = propiedades.filter(p=>p.id!==id);
  store('props',propiedades);
  goPage('propiedades');
  toast('Publicación eliminada','success');
}

function saveProp(id) {
  const titulo = document.getElementById('pf-titulo')?.value?.trim();
  if(!titulo) { toast('Completá el título','error'); return; }
  const data = {
    titulo, tipo: document.getElementById('pf-tipo').value,
    precio: document.getElementById('pf-precio').value,
    zona: document.getElementById('pf-zona').value,
    sup: document.getElementById('pf-sup').value,
    desc: document.getElementById('pf-desc').value,
    features: document.getElementById('pf-features').value,
    imgs: [document.getElementById('pf-img').value || 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&q=70'],
    oferta: document.getElementById('pf-oferta').value==='true',
    estado: document.getElementById('pf-estado').value,
    fecha: new Date().toISOString().slice(0,10),
  };
  if(id) {
    const idx = propiedades.findIndex(p=>p.id===id);
    if(idx>-1) { propiedades[idx] = {...propiedades[idx], ...data}; }
  } else {
    data.id = Date.now();
    propiedades.push(data);
  }
  store('props',propiedades);
  closeModal();
  goPage('propiedades');
  toast(`Propiedad ${id?'actualizada':'publicada'} exitosamente ✓`,'success');
}

function saveCita() {
  const cliente = document.getElementById('cf-cliente')?.value?.trim();
  if(!cliente){ toast('Ingresá el nombre del cliente','error'); return; }
  citas.push({
    id: Date.now(),
    cliente, tel: document.getElementById('cf-tel').value,
    tipo: document.getElementById('cf-tipo').value,
    propiedad: document.getElementById('cf-prop').value||'Sin especificar',
    fecha: document.getElementById('cf-fecha').value,
    hora: document.getElementById('cf-hora').value,
    estado: 'pendiente',
    notas: document.getElementById('cf-notas').value,
  });
  store('citas',citas);
  closeModal(); goPage('citas');
  toast('Cita agendada exitosamente ✓','success');
}

function confirmCita(id) {
  const c = citas.find(c=>c.id===id);
  if(c){ c.estado='confirmada'; store('citas',citas); goPage('citas'); toast('Cita confirmada ✓','success'); }
}

function editCita(id) {
  const c = citas.find(c=>c.id===id);
  if(!c) return;
  openModal('Editar Cita', `
    <div class="form-grid">
      <div class="form-group"><label>Estado</label>
        <select id="ce-estado"><option value="pendiente" ${c.estado==='pendiente'?'selected':''}>Pendiente</option><option value="confirmada" ${c.estado==='confirmada'?'selected':''}>Confirmada</option><option value="cancelada" ${c.estado==='cancelada'?'selected':''}>Cancelada</option></select>
      </div>
      <div class="form-group"><label>Notas</label><input id="ce-notas" type="text" value="${c.notas}"></div>
    </div>
    <button class="btn-primary" style="width:100%;margin-top:16px" onclick="updateCita(${id})">Guardar →</button>
  `);
}

function updateCita(id) {
  const c = citas.find(c=>c.id===id);
  if(c){ c.estado=document.getElementById('ce-estado').value; c.notas=document.getElementById('ce-notas').value; store('citas',citas); }
  closeModal(); goPage('citas'); toast('Cita actualizada ✓','success');
}

function delCita(id) {
  if(!confirm('¿Eliminar esta cita?')) return;
  citas = citas.filter(c=>c.id!==id); store('citas',citas); goPage('citas'); toast('Cita eliminada','success');
}

function calcTotal() {
  const inputs = document.querySelectorAll('#presItems .presup-item input:last-of-type');
  let total = 0;
  inputs.forEach(i=>{ const n=parseFloat(i.value.replace(/[^0-9.]/g,'')); if(!isNaN(n)) total+=n; });
  const el = document.getElementById('presTotal');
  if(el) el.textContent = 'USD ' + total.toLocaleString('es-AR');
}

function savePresup() {
  const cliente = document.getElementById('pres-cliente')?.value?.trim();
  if(!cliente){ toast('Ingresá el nombre del cliente','error'); return; }
  const items = [];
  document.querySelectorAll('#presItems .presup-item').forEach(row=>{
    const ins = row.querySelectorAll('input');
    if(ins[0].value) items.push(ins[0].value + ': ' + (ins[1].value||'$0'));
  });
  const totalEl = document.getElementById('presTotal');
  presupuestos.push({
    id: Date.now(),
    cliente, email: document.getElementById('pres-email').value,
    concepto: items.join(' · '),
    total: totalEl?.textContent||'USD 0',
    fecha: new Date().toISOString().slice(0,10),
    estado:'enviado'
  });

function handleLogoUpload(input, brandKey, w, h) {
  const file = input.files[0];
  if(!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = e => {
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      let dataUrl;
      try { dataUrl = canvas.toDataURL('image/webp', 0.85); }
      catch(err) { dataUrl = canvas.toDataURL('image/png'); }
      brand[brandKey] = dataUrl;
      store('brand', brand);
      renderConfigTabBody();
      toast('Logo actualizado y optimizado ✓','success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

  favs = favs.filter(f=>f!==id); store('favs',favs);

}

// ── UTILS ─────────────────────────────────────────────────────
function openModal(title, content) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').innerHTML = content;
  document.getElementById('mainOverlay').classList.add('open');
}
function closeModal() { document.getElementById('mainOverlay').classList.remove('open'); }
function closeOverlay(e) { if(e.target.id==='mainOverlay') closeModal(); }

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type==='success'?'✓ ':type==='error'?'⚠ ':'') + msg;
  t.className = 'toast show ' + type;
  setTimeout(()=>t.className='toast', 3200);
}
